name: Bench

# Manual real-CLI benchmark on real corpora, each with its own .rubocop.yml
# and all plugin gems installed. Each round runs several modes back to back on
# the same runner: stock, shirobai (this branch), removed (stock minus the
# implemented cops = the replacement upper bound) and, on branches, main
# (shirobai from the main branch, for a same-runner branch-vs-main comparison).
# Before timing, each shirobai-family mode must report the same offense set as
# stock — the run proves "same offenses, less time".
#
# On main the auto modes are "stock removed shirobai plugins": the plugins
# release instrument (shirobai core + shirobai-performance + shirobai-rspec)
# lives on main. On branches the auto modes stay "stock removed shirobai main"
# (branch vs main on the core line). A plugin-cop branch opts into the plugin
# comparison explicitly with -f modes="stock shirobai plugins plugins-main".
#
# Trigger from CLI:
#   gh workflow run bench.yml
#   gh workflow run bench.yml -f corpora="redmine fluentd" -f rounds=5
#   gh workflow run bench.yml -f modes="stock shirobai"
#   gh workflow run bench.yml -f modes="stock shirobai plugins plugins-main"  # plugin branch
#   gh workflow run bench.yml --ref <branch>

on:
  workflow_dispatch:
    inputs:
      corpora:
        description: "Space-separated corpora (mastodon discourse redmine fluentd)"
        required: false
        default: "mastodon discourse redmine fluentd"
      rounds:
        description: "Timed rounds per mode"
        required: false
        default: "3"
      modes:
        description: "Modes per round (empty = auto: on main stock removed shirobai plugins; on branches stock removed shirobai main). Plugin branches: -f modes='stock shirobai plugins plugins-main'"
        required: false
        default: ""

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      corpora: ${{ steps.set.outputs.corpora }}
      modes: ${{ steps.set.outputs.modes }}
    steps:
      - id: set
        run: |
          corpora=$(echo "$CORPORA" | jq -cR 'split(" ") | map(select(length > 0))')
          echo "corpora=$corpora" >> "$GITHUB_OUTPUT"
          # Auto-select modes when the input is empty. On main there is no
          # branch to compare against, so main mode is left out; instead main
          # runs the plugins release instrument (core + both plugin shells).
          if [ -n "$MODES_INPUT" ]; then
            modes="$MODES_INPUT"
          elif [ "$REF_NAME" = "main" ]; then
            modes="stock removed shirobai plugins"
          else
            modes="stock removed shirobai main"
          fi
          echo "modes=$modes" >> "$GITHUB_OUTPUT"
        env:
          # The fallback covers events without inputs (e.g. a temporary
          # push trigger) and an explicitly empty input.
          CORPORA: ${{ inputs.corpora || 'mastodon discourse redmine fluentd' }}
          MODES_INPUT: ${{ inputs.modes }}
          REF_NAME: ${{ github.ref_name }}

  bench:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        corpus: ${{ fromJSON(needs.plan.outputs.corpora) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.9.1
        with:
          shared-key: bench

      - name: Build native extension
        run: bundle exec rake compile

      - name: Install bench Gemfiles
        run: |
          BUNDLE_GEMFILE=benches/Gemfile.realconfig.stock bundle install --jobs 4
          BUNDLE_GEMFILE=benches/Gemfile.realconfig.shirobai bundle install --jobs 4
          BUNDLE_GEMFILE=benches/Gemfile.realconfig.plugins bundle install --jobs 4

      # main mode needs a second checkout of the main branch, built the same
      # way, so branch and main run side by side on one runner.
      # Note: `plugins-main` contains the substring `main`, so these steps
      # also fire for plugins-main. That is intentional and relied upon:
      # plugins-main installs its trio from this same second checkout.
      - name: Check out main for the main mode
        if: contains(needs.plan.outputs.modes, 'main')
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: main-tree
          submodules: true

      - name: Build the main tree
        if: contains(needs.plan.outputs.modes, 'main')
        working-directory: main-tree
        run: |
          bundle install --jobs 4
          bundle exec rake compile

      - name: Install the main bench Gemfile
        if: contains(needs.plan.outputs.modes, 'main')
        env:
          SHIROBAI_MAIN_TREE: ${{ github.workspace }}/main-tree
        run: BUNDLE_GEMFILE=benches/Gemfile.realconfig.main bundle install --jobs 4

      # plugins-main installs the plugin trio from the same second checkout.
      - name: Install the plugins-main bench Gemfile
        if: contains(needs.plan.outputs.modes, 'plugins-main')
        env:
          SHIROBAI_MAIN_TREE: ${{ github.workspace }}/main-tree
        run: BUNDLE_GEMFILE=benches/Gemfile.realconfig.plugins.main bundle install --jobs 4

      - name: Clone corpus
        run: bin/setup-corpora ${{ matrix.corpus }}

      - name: Bench (${{ matrix.corpus }})
        env:
          MODES: ${{ needs.plan.outputs.modes }}
          SHIROBAI_MAIN_TREE: ${{ github.workspace }}/main-tree
        run: |
          VERIFY=1 SUMMARY_FILE="$GITHUB_STEP_SUMMARY" \
            benches/real_cli_bench.sh ".tmp/${{ matrix.corpus }}" "${{ inputs.rounds || '3' }}"
