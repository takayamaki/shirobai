name: Release gem

on:
  push:
    branches: [main]
    paths: [lib/shirobai/version.rb]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment: release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Read version and tag
        id: version
        run: |
          ver=$(ruby -r ./lib/shirobai/version -e 'puts Shirobai::VERSION')
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"
          # Skip tagging when the tag is already on origin, so a partly
          # failed release can be retried with "Re-run failed jobs".
          if git ls-remote --exit-code --tags origin "v$ver" > /dev/null; then
            echo "Tag v$ver already exists on origin"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$ver"
            git push origin "v$ver"
          fi

      - uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
