name: Bump version

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate calendar version
        id: version
        run: |
          ver=$(TZ=Asia/Tokyo date +'%Y.%m%d.%H%M')
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Update version.rb
        run: |
          ver="${{ steps.version.outputs.version }}"
          for f in \
            lib/shirobai/version.rb \
            gems/shirobai-performance/lib/shirobai/performance/version.rb \
            gems/shirobai-rspec/lib/shirobai/rspec/version.rb \
            gems/shirobai-rails/lib/shirobai/rails/version.rb; do
            sed -i "s/VERSION = .*/VERSION = \"$ver\"/" "$f"
          done

      # The crate version follows the gem version in its semver form: cargo
      # rejects leading zeros in numeric segments, and Gem::Version already
      # normalizes to the same integers (gem 2026.0709.0000 == crate
      # 2026.709.0). 10# forces base-10 so "0709" is not read as octal.
      - name: Update crate version (workspace.package)
        run: |
          ver="${{ steps.version.outputs.version }}"
          IFS=. read -r y md hm <<< "$ver"
          cargo_ver="$((10#$y)).$((10#$md)).$((10#$hm))"
          sed -i "s/^version = \".*\"/version = \"$cargo_ver\"/" Cargo.toml
          cargo update --workspace --offline

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${{ steps.version.outputs.version }}"
          branch="release/$ver"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add \
            lib/shirobai/version.rb \
            gems/shirobai-performance/lib/shirobai/performance/version.rb \
            gems/shirobai-rspec/lib/shirobai/rspec/version.rb \
            gems/shirobai-rails/lib/shirobai/rails/version.rb \
            Cargo.toml Cargo.lock
          git commit -m "Bump version to $ver"
          git push origin "$branch"
          gh pr create \
            --title "Release $ver" \
            --body "Bumps version to \`$ver\`. Merging this will trigger the release workflow." \
            --base main \
            --head "$branch"
